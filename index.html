<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serverless GitHub Game</title>
    <!-- Trystero library: Uses BitTorrent trackers for zero-config multiplayer -->
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #222; border: 2px solid #444; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { position: absolute; top: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="info">
        <h3 id="room-name">Connecting...</h3>
        <p>Use WASD or Arrows. Share your URL to play!</p>
    </div>
    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // --- 1. Multiplayer Setup ---
        // Join a "room" based on your URL or a default name
        const config = {appId: 'my-github-game-123'};
        const room = Trystero.joinRoom(config, 'lobby');
        
        const [sendMove, getMove] = room.makeAction('move');
        const players = {}; // Other players
        const me = { id: Math.random().toString(36).substr(2, 9), x: 400, y: 250, color: 'cyan' };

        room.onPeerJoin(peerId => {
            console.log(`${peerId} joined`);
            document.getElementById('room-name').innerText = "Friend Joined!";
        });

        room.onPeerLeave(peerId => delete players[peerId]);

        // Receive movements from others
        getMove((data, peerId) => {
            players[peerId] = data;
        });

        // --- 2. Game Logic ---
        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function update() {
            let moved = false;
            if (keys['w'] || keys['arrowup']) { me.y -= 5; moved = true; }
            if (keys['s'] || keys['arrowdown']) { me.y += 5; moved = true; }
            if (keys['a'] || keys['arrowleft']) { me.x -= 5; moved = true; }
            if (keys['d'] || keys['arrowright']) { me.x += 5; moved = true; }

            if (moved) sendMove({x: me.x, y: me.y, color: me.color});
        }

        function draw() {
            update();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw others
            Object.values(players).forEach(p => {
                ctx.fillStyle = 'orange';
                ctx.fillRect(p.x, p.y, 30, 30);
            });

            // Draw me
            ctx.fillStyle = me.color;
            ctx.fillRect(me.x, me.y, 30, 30);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(me.x, me.y, 30, 30);

            requestAnimationFrame(draw);
        }

        document.getElementById('room-name').innerText = "Room: Lobby (Ready)";
        draw();
    </script>
</body>
</html>
