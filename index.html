<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Battle</title>
    <!-- This library handles the "Server" part inside the browser -->
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #111; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; cursor: crosshair; }
        .hud { position: absolute; top: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; }
    </style>
</head>
<body>

    <div class="hud">
        Status: <span id="status">Searching for Players...</span><br>
        Players Online: <span id="count">1</span>
    </div>

    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const countEl = document.getElementById('count');

        // --- MULTIPLAYER LOGIC ---
        // This "Room" connects everyone on your website together
        const config = {appId: 'abcserver-iready-game'}; 
        const room = Trystero.joinRoom(config, 'lobby');
        const [sendMove, getMove] = room.makeAction('move');

        const me = { x: 400, y: 250, id: Math.random().toString(16).slice(2, 6) };
        const peers = {};

        room.onPeerJoin(id => {
            statusEl.innerText = "Player Connected!";
            countEl.innerText = Object.keys(peers).length + 2;
        });

        room.onPeerLeave(id => {
            delete peers[id];
            countEl.innerText = Object.keys(peers).length + 1;
            if (Object.keys(peers).length === 0) statusEl.innerText = "Waiting for players...";
        });

        // This receives data from other players (the "Server" work)
        getMove((data, id) => {
            peers[id] = data;
        });

        // --- CONTROLS ---
        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            me.x = e.clientX - rect.left;
            me.y = e.clientY - rect.top;
            // Send our position to everyone else
            sendMove({x: me.x, y: me.y, id: me.id});
        };

        // --- DRAWING ---
        function frame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Other Players (Magenta)
            Object.values(peers).forEach(p => {
                ctx.fillStyle = '#f0f';
                ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                ctx.fillText("ID: " + p.id, p.x - 15, p.y - 20);
            });

            // Draw Me (Cyan)
            ctx.fillStyle = '#0ff';
            ctx.fillRect(me.x - 15, me.y - 15, 30, 30);
            ctx.fillText("YOU (" + me.id + ")", me.x - 15, me.y - 20);

            requestAnimationFrame(frame);
        }
        frame();
    </script>
</body>
</html>
