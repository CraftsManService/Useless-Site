<!DOCTYPE html>
<html>
<head>
    <title>C++ Multiplayer Battle</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; text-align: center; overflow: hidden; }
        canvas { background: #111; border: 2px solid #0f0; margin-top: 20px; cursor: crosshair; }
        #status { position: absolute; top: 10px; width: 100%; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="status">Connecting to C++ Server...</div>
    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        // YOUR DIRECT CLOUDSHELL LINK
        const SERVER_URL = 'https://8080-cs-1b5bcf6f-5fa5-4bf0-a2be-1daba682b8ec.cs-us-central1-pits.cloudshell.dev';

        const myId = Math.random().toString(16).slice(2, 6);
        let me = { x: 400, y: 250 };
        let players = {};

        // 1. SYNC WITH C++ SERVER
        async function sync() {
            try {
                const res = await fetch(SERVER_URL, {
                    method: 'POST',
                    // Sending our ID and position as a simple string for the C++ to read
                    body: `${myId},${Math.floor(me.x)},${Math.floor(me.y)}`
                });
                
                players = await res.json();
                status.innerText = "C++ SERVER LIVE (Players: " + Object.keys(players).length + ")";
            } catch (e) {
                status.innerText = "OFFLINE - Make sure Web Preview is PUBLIC";
            }
            setTimeout(sync, 50); // Sync every 50ms
        }

        // 2. CONTROLS
        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            me.x = e.clientX - rect.left;
            me.y = e.clientY - rect.top;
        };

        // 3. DRAWING
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Me (Cyan)
            ctx.fillStyle = '#0ff';
            ctx.fillRect(me.x - 15, me.y - 15, 30, 30);
            ctx.fillText("YOU", me.x - 15, me.y - 20);

            // Draw Others (Red)
            ctx.fillStyle = '#f00';
            for (let id in players) {
                if (id !== myId) {
                    let p = players[id];
                    ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                }
            }
            requestAnimationFrame(draw);
        }

        sync();
        draw();
    </script>
</body>
</html>
