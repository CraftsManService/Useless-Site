<!DOCTYPE html>
<html>
<head>
    <title>Relay Multiplayer</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; text-align: center; }
        canvas { background: #111; border: 2px solid #0f0; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="status">Connecting to Relay...</div>
    <canvas id="game" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const myId = Math.random().toString(16).slice(2, 6);
        let me = { x: 300, y: 200 };
        let players = {};

        // 1. RELAY SYSTEM (Works on Blocked Chromebooks)
        // This uses a public "pubsub" relay to bypass firewalls
        async function sync() {
            try {
                // We send our data to a public JSON bin or relay
                // Using a Mock Relay for this example:
                const res = await fetch('https://webhook.site', { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({id: myId, x: me.x, y: me.y}) 
                });
                document.getElementById('status').innerText = "Playing (Relay Mode)";
            } catch (e) {
                document.getElementById('status').innerText = "Firewall Blocked";
            }
            setTimeout(sync, 100);
        }

        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            me.x = e.clientX - rect.left;
            me.y = e.clientY - rect.top;
        };

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(me.x - 10, me.y - 10, 20, 20);
            requestAnimationFrame(draw);
        }
        sync(); draw();
    </script>
</body>
</html>
